name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: minesweeper-cli-linux-amd64
          - goos: windows
            goarch: amd64
            artifact_name: minesweeper-cli-windows-amd64.exe
          - goos: linux
            goarch: arm64
            artifact_name: minesweeper-cli-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Build Binary
        run: |
          make build ARCH=${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv bin/${{ matrix.goos }}/${{ matrix.goarch }}/minesweeper-cli bin/${{ matrix.goos }}/${{ matrix.goarch }}/minesweeper-cli.exe
            mv bin/${{ matrix.goos }}/${{ matrix.goarch }}/minesweeper-cli.exe ./${{ matrix.matrix.artifact_name }}
          else
            mv bin/${{ matrix.goos }}/${{ matrix.goarch }}/minesweeper-cli ./${{ matrix.artifact_name }}
          fi

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
